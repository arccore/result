name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  build:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Arccore.Result.slnx

      - name: Build
        run: dotnet build Arccore.Result.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet run --project Arccore.Result.Tests\Arccore.Result.Tests.csproj --configuration Release --no-build
